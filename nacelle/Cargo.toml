[package]
name = "nacelle"
version = "0.1.0"
edition = "2024"

[features]
default = ["raw_tcp"]
raw_tcp = []
reference_protocol = ["raw_tcp"]
http = ["dep:http", "dep:http-body-util", "dep:hyper", "dep:hyper-util"]
tls = ["http", "dep:rustls", "dep:tokio-rustls", "dep:rustls-pemfile"]
tls-self-signed = ["tls", "dep:rcgen"]
otel = ["dep:opentelemetry"]
tower = ["dep:tower"]
bench = []
fuzzing = []

[dependencies]
bytes = "1.10.1"
mimalloc = { version = "0.1", default-features = false }
futures-core = "0.3.31"
http = { version = "1", optional = true }
http-body-util = { version = "0.1", optional = true }
hyper = { version = "1", features = ["http1", "server"], optional = true }
hyper-util = { version = "0.1", features = ["server", "tokio"], optional = true }
opentelemetry = { version = "0.32", optional = true }
tower = { version = "0.5", features = ["util"], optional = true }
tokio = { version = "1.47.1", features = ["io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
tracing = "0.1.44"
rustls = { version = "0.23.40", optional = true }
tokio-rustls = { version = "0.26.4", optional = true }
rustls-pemfile = { version = "2.2.0", optional = true }
rcgen = { version = "0.14.8", optional = true }

[dev-dependencies]
criterion = "0.8.2"
proptest = "1.11.0"

[[bench]]
name = "critical_paths"
harness = false
required-features = ["bench", "reference_protocol"]

[[example]]
name = "echo"
path = "examples/echo.rs"
required-features = ["reference_protocol"]

[[example]]
name = "http_echo"
path = "examples/http_echo.rs"
required-features = ["http"]

[[example]]
name = "tls_http_echo"
path = "examples/tls_http_echo.rs"
required-features = ["tls-self-signed"]

[[example]]
name = "dual_echo"
path = "examples/dual_echo.rs"
required-features = ["reference_protocol", "http"]
