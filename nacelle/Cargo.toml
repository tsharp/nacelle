[package]
name = "nacelle"
version = "0.1.0"
edition = "2024"

[features]
default = ["tcp"]
tcp = []
bench = []
fuzzing = []

[dependencies]
bytes = "1.10.1"
mimalloc = { version = "0.1", default-features = false }
futures-core = "0.3.31"
tokio = { version = "1.47.1", features = ["io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }

[dev-dependencies]
criterion = "0.5.1"

[[bench]]
name = "critical_paths"
harness = false
required-features = ["bench"]
