[package]
name = "nacelle"
version = "0.1.0"
edition = "2024"

[features]
default = ["raw_tcp"]
raw_tcp = ["dep:nacelle-tcp"]
reference_protocol = ["raw_tcp"]
http = ["dep:http", "dep:nacelle-http", "nacelle-core/http-types"]
tls = ["nacelle-core/tls", "nacelle-http?/tls", "nacelle-tcp?/tls"]
tls-self-signed = ["tls", "nacelle-core/tls-self-signed", "nacelle-http?/tls-self-signed", "nacelle-tcp?/tls-self-signed"]
otel = ["nacelle-core/otel"]
tower = ["nacelle-core/tower"]
bench = []
fuzzing = []

[dependencies]
bytes = "1.10.1"
http = { version = "1", optional = true }
nacelle-core = { path = "../nacelle-core" }
nacelle-http = { path = "../nacelle-http", optional = true }
nacelle-tcp = { path = "../nacelle-tcp", optional = true }
tokio = { version = "1.47.1", features = ["io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }

[dev-dependencies]
criterion = "0.8.2"
proptest = "1.11.0"

[[bench]]
name = "critical_paths"
harness = false
required-features = ["bench", "reference_protocol"]

[[example]]
name = "echo"
path = "examples/echo.rs"
required-features = ["reference_protocol"]

[[example]]
name = "http_echo"
path = "examples/http_echo.rs"
required-features = ["http"]

[[example]]
name = "tls_http_echo"
path = "examples/tls_http_echo.rs"
required-features = ["http", "tls-self-signed"]

[[example]]
name = "dual_echo"
path = "examples/dual_echo.rs"
required-features = ["reference_protocol", "http"]
