<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">nacelle mark refined v2</title>
  <desc id="desc">A streamlined nacelle logo mark for a TCP service runtime, with socket inlet, curved packet lanes, and a lighter rear stabilizer.</desc>
  <defs>
    <linearGradient id="body" x1="7" y1="18" x2="59" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.58" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="keel" x1="12" y1="40" x2="60" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.72" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="fin" x1="8" y1="44" x2="31" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.2" stdDeviation="2.2" flood-color="#020617" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- rear stabilizer: lighter, lower, and swept so it supports rather than competes with the mark -->
  <path d="M8.4 43.4c3.2.7 6.1 1.1 8.9 1.2 2.3 4.4 6.7 7.1 13.2 8.1H18.7c-6.1-.5-9.6-3.7-10.3-9.3Z" fill="url(#fin)"/>
  <path d="M17.3 44.6c2.2 3.6 5.8 6.2 10.8 7.9-7.3-.7-12.2-3.6-14.7-8.4 1.3.2 2.6.4 3.9.5Z" fill="#64748b" opacity="0.28"/>

  <!-- main housing -->
  <path d="M7.3 36.1c2.1-8.2 9.2-14.6 19.3-18.2C34.4 15.1 43 13.9 52.5 14c4.7.1 7.6 3.7 6.8 8.1-2.2 12.5-18 21.1-36.2 20.1-7.8-.5-13.3-2.7-15.8-6.1Z" fill="url(#body)" filter="url(#softShadow)"/>

  <!-- lower thrust/keel band, redrawn with a cleaner forward-to-rear sweep -->
  <path d="M9.4 36.3c7.8 4.7 23.2 5.5 39.3-1.6 4.8-2.1 8.5-4.9 10.9-8.2-1.9 5.4-6.8 10.2-13.7 13.2-7 3.1-15.4 4.7-23.4 4.3-7.1-.3-11.8-2.8-13.1-7.7Z" fill="url(#keel)"/>

  <!-- upper reflection: longer and more aerodynamic -->
  <path d="M24.7 23.3c7.2-3.1 15.6-4.6 25.1-4.6 2.3 0 4 .3 5.1 1-9.8 1.4-19.9 5.1-30.2 10.8Z" fill="#ccfbf1" opacity="0.93"/>
  <path d="M24.7 23.3v7.2" stroke="#ccfbf1" stroke-width="0.35" opacity="0.55"/>

  <!-- socket inlet -->
  <ellipse cx="18" cy="34.3" rx="9.6" ry="7.5" fill="#0f172a"/>
  <ellipse cx="18" cy="34.3" rx="5.3" ry="4.1" fill="#e2e8f0"/>
  <ellipse cx="18" cy="34.3" rx="2.3" ry="1.8" fill="#0f172a" opacity="0.92"/>

  <!-- curved TCP lanes: follow the hull instead of sitting as flat bars -->
  <path d="M30.2 30.5c5.2.2 11.8-.1 18.6-1.8" fill="none" stroke="#0f172a" stroke-width="2.45" stroke-linecap="round" opacity="0.36"/>
  <path d="M33.9 35.2c4.4-.1 9-.8 13.3-2.2" fill="none" stroke="#0f172a" stroke-width="2.45" stroke-linecap="round" opacity="0.36"/>
  <circle cx="51.9" cy="27.7" r="1.65" fill="#0f172a" opacity="0.32"/>
  <circle cx="49.6" cy="32.1" r="1.65" fill="#0f172a" opacity="0.32"/>
</svg>
