name: CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy Raw TCP
        run: cargo clippy -p nacelle --no-default-features --features tcp --all-targets -- -D warnings
      - name: Clippy Raw TCP TLS
        run: cargo clippy -p nacelle-tcp --features tls-self-signed --all-targets -- -D warnings
      - name: Clippy Reference Protocol
        run: cargo clippy -p nacelle --features reference_protocol --all-targets -- -D warnings
      - name: Clippy HTTP
        run: cargo clippy -p nacelle --no-default-features --features http --all-targets -- -D warnings
      - name: Clippy Dual
        run: cargo clippy -p nacelle --features reference_protocol,http --all-targets -- -D warnings
      - name: Clippy Tower
        run: cargo clippy -p nacelle --features reference_protocol,http,tower --all-targets -- -D warnings
      - name: Clippy OTel
        run: cargo clippy -p nacelle --features reference_protocol,http,tower,otel --all-targets -- -D warnings
      - name: Clippy All Features
        run: cargo clippy -p nacelle --features reference_protocol,http,tower,otel,tls-self-signed --all-targets -- -D warnings
      - name: Test Raw TCP
        run: cargo test --workspace --all-targets
      - name: Test Raw TCP Without Reference Protocol
        run: cargo test -p nacelle --no-default-features --features tcp --all-targets
      - name: Test Raw TCP TLS
        run: cargo test -p nacelle-tcp --features tls-self-signed --all-targets
      - name: Test Reference Protocol TLS
        run: cargo test -p nacelle --features reference_protocol,tls-self-signed --all-targets
      - name: Test Reference Protocol
        run: cargo test -p nacelle --features reference_protocol --all-targets
      - name: Test HTTP
        run: cargo test -p nacelle --no-default-features --features http --all-targets
      - name: Test Dual
        run: cargo test -p nacelle --features reference_protocol,http --all-targets
      - name: Test Tower
        run: cargo test -p nacelle --features reference_protocol,http,tower --all-targets
      - name: Test OTel
        run: cargo test -p nacelle --features reference_protocol,http,tower,otel --all-targets
      - name: Test Stress Server
        run: cargo test -p nacelle-stress-server --all-targets
      - name: Test Stress Server Without Default Features
        run: cargo test -p nacelle-stress-server --no-default-features --all-targets
      - name: Ensure deprecated YAML stack is absent
        run: |
          ! cargo tree -i serde_yaml >/dev/null 2>&1
          ! cargo tree -i unsafe-libyaml >/dev/null 2>&1
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit
        run: cargo audit
