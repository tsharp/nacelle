bind = "127.0.0.1:7878"
server_threads = 8
response_bytes = 64
read_buffer_capacity = 65536
response_buffer_capacity = 16384
request_body_chunk_size = 16384
request_body_channel_capacity = 8
low_memory = false
byte_metrics = true
tls_self_signed = false

[limits]
max_connections = 128000
max_connections_per_peer = 4096
# Optional churn protection for direct edge tests.
# max_connection_opens_per_peer_per_second = 2048
max_in_flight_requests = 64000
max_streaming_tasks = 8192
max_memory_bytes = 8589934592
max_request_body_bytes = 16777216
max_response_body_bytes = 16777216
handler_timeout_ms = 60000

[tcp_limits]
read_timeout_ms = 30000
write_timeout_ms = 30000
idle_timeout_ms = 120000
