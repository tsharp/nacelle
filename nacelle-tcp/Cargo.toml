[package]
name = "nacelle-tcp"
version = "0.1.0"
edition = "2024"
description = "Raw TCP transport and protocol runtime for Nacelle streaming handlers."
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "../README.md"
keywords = ["networking", "tokio", "tcp"]
categories = ["asynchronous", "network-programming"]

[features]
default = []
tls = ["dep:rustls", "dep:tokio-rustls", "nacelle-core/tls"]
tls-self-signed = ["tls", "nacelle-core/tls-self-signed"]

[dependencies]
bytes = "1.10.1"
nacelle-core = { path = "../nacelle-core" }
rustls = { version = "0.23.40", optional = true }
tokio = { version = "1.47.1", features = ["io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
tokio-rustls = { version = "0.26.4", optional = true }
tracing = "0.1.44"
