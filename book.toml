[book]
title = "nacelle"
authors = ["nacelle contributors"]
description = "Narrative documentation for nacelle, organized as tutorials, topic guides, how-to guides, and reference."
src = "docs/book-src"
language = "en"

[build]
build-dir = "docs/book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/tsharp/nacelle"
edit-url-template = "https://github.com/tsharp/nacelle/edit/main/{path}"
additional-css = ["docs/book-src/theme/nacelle.css"]
site-url = "/nacelle/"
